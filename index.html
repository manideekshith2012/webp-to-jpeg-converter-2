<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
<meta name="google-site-verification" content="kLL7eIH4NDEe2Iktf4ZUtqWx5A3Z1GnEscSwx1SZFUU" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebP to JPEG Converter</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #5f6b7c;
      --line: #d9e0ea;
      --blue: #0f6ad8;
      --blue-dark: #0a55ad;
      --green: #0f7b55;
      --red: #b42318;
      --shadow: 0 18px 45px rgba(24, 32, 47, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 24px;
      align-items: start;
    }

    .toolbar,
    .preview {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .toolbar {
      padding: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      display: block;
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      object-fit: cover;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lede {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .dropzone {
      display: grid;
      place-items: center;
      min-height: 230px;
      padding: 22px;
      border: 2px dashed #9aabc1;
      border-radius: 8px;
      background: #f9fbff;
      text-align: center;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .dropzone.dragging {
      border-color: var(--blue);
      background: #eef6ff;
    }

    .upload-icon {
      width: 50px;
      height: 50px;
      margin: 0 auto 12px;
      color: var(--blue);
    }

    .dropzone strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1.05rem;
    }

    .dropzone span {
      color: var(--muted);
      font-size: 0.93rem;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .controls {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 54px;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    output {
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    button,
    .choose-button,
    .download-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font: inherit;
      font-weight: 750;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover,
    .choose-button:hover,
    .download-button:hover {
      background: var(--blue-dark);
    }

    button:disabled,
    .download-button[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .choose-button {
      margin-top: 16px;
      width: 100%;
    }

    .status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .status.ok {
      color: var(--green);
    }

    .status.error {
      color: var(--red);
    }

    .facts {
      display: grid;
      gap: 9px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .fact {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      font-size: 0.91rem;
    }

    .fact b {
      color: var(--text);
      font-weight: 750;
      text-align: right;
      word-break: break-word;
    }

    .preview {
      min-height: 620px;
      padding: 18px;
    }

    .preview-frame {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 584px;
      border-radius: 8px;
      background:
        linear-gradient(45deg, #edf1f6 25%, transparent 25%),
        linear-gradient(-45deg, #edf1f6 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #edf1f6 75%),
        linear-gradient(-45deg, transparent 75%, #edf1f6 75%);
      background-color: #ffffff;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      background-size: 24px 24px;
      overflow: hidden;
    }

    .preview-frame img {
      display: block;
      max-width: 100%;
      max-height: 584px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .empty {
      max-width: 360px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.45;
    }

    svg {
      flex: 0 0 auto;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 24px, 640px);
        padding: 18px 0;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .preview,
      .preview-frame {
        min-height: 360px;
      }

      .preview-frame img {
        max-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="app">
      <section class="toolbar" aria-labelledby="title">
        <div class="brand">
          <img class="logo" src="public/images/4e8a690b-fab5-4d75-b9e1-7499b8cc68f9.png" alt="Logo" />
        </div>
        <h1 id="title">WebP to JPEG</h1>
        <p class="lede">Convert WebP images locally in your browser. The exported JPEG keeps the original pixel width and height, including 4K images.</p>

        <label class="dropzone" id="dropzone" for="file">
          <span>
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 16V4"></path>
              <path d="m7 9 5-5 5 5"></path>
              <path d="M20 16.5v2.25A2.25 2.25 0 0 1 17.75 21H6.25A2.25 2.25 0 0 1 4 18.75V16.5"></path>
            </svg>
            <strong>Drop a WebP file here</strong>
            <span>or choose one from your computer</span>
          </span>
        </label>
        <input class="file-input" id="file" type="file" accept="image/webp,.webp" />
        <label class="choose-button" for="file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
          </svg>
          Choose WebP
        </label>

        <div class="controls">
          <label>
            JPEG quality
            <span class="range-row">
              <input id="quality" type="range" min="80" max="100" value="100" />
              <output id="qualityValue" for="quality">100%</output>
            </span>
          </label>

          <button id="convert" type="button" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
              <path d="M3 21v-5h5"></path>
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
              <path d="M16 8h5V3"></path>
            </svg>
            Convert to JPEG
          </button>

          <a class="download-button" id="download" href="#" download aria-disabled="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 21h14"></path>
            </svg>
            Download JPEG
          </a>

          <p class="status" id="status">No file selected.</p>
        </div>

        <div class="facts" aria-live="polite">
          <div class="fact"><span>Input</span><b id="inputInfo">-</b></div>
          <div class="fact"><span>Output</span><b id="outputInfo">-</b></div>
          <div class="fact"><span>Size</span><b id="sizeInfo">-</b></div>
        </div>
      </section>

      <section class="preview" aria-label="Image preview">
        <div class="preview-frame" id="previewFrame">
          <p class="empty" id="empty">The selected image preview will appear here at its original aspect ratio.</p>
          <img id="preview" alt="" hidden />
        </div>
      </section>
    </div>
  </main>

  <script>
    const fileInput = document.getElementById("file");
    const dropzone = document.getElementById("dropzone");
    const quality = document.getElementById("quality");
    const qualityValue = document.getElementById("qualityValue");
    const convert = document.getElementById("convert");
    const download = document.getElementById("download");
    const statusEl = document.getElementById("status");
    const inputInfo = document.getElementById("inputInfo");
    const outputInfo = document.getElementById("outputInfo");
    const sizeInfo = document.getElementById("sizeInfo");
    const preview = document.getElementById("preview");
    const empty = document.getElementById("empty");

    let currentFile = null;
    let sourceUrl = "";
    let outputUrl = "";

    quality.addEventListener("input", () => {
      qualityValue.textContent = quality.value + "%";
      revokeOutput();
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (file) {
        loadFile(file);
      }
    });

    for (const eventName of ["dragenter", "dragover"]) {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add("dragging");
      });
    }

    for (const eventName of ["dragleave", "drop"]) {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove("dragging");
      });
    }

    dropzone.addEventListener("drop", (event) => {
      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      if (file) {
        loadFile(file);
      }
    });

    convert.addEventListener("click", async () => {
      if (!currentFile) {
        return;
      }

      setStatus("Converting at original pixel dimensions...", "");
      convert.disabled = true;
      revokeOutput();

      try {
        const bitmap = await createImageBitmap(currentFile, { colorSpaceConversion: "default" });
        const canvas = document.createElement("canvas");
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;

        const ctx = canvas.getContext("2d", { alpha: false });
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bitmap, 0, 0);
        bitmap.close();

        const blob = await canvasToBlob(canvas, "image/jpeg", Number(quality.value) / 100);
        outputUrl = URL.createObjectURL(blob);

        const baseName = currentFile.name.replace(/\.webp$/i, "") || "converted";
        download.href = outputUrl;
        download.download = baseName + ".jpg";
        download.setAttribute("aria-disabled", "false");
        outputInfo.textContent = canvas.width + " x " + canvas.height + " JPEG";
        sizeInfo.textContent = formatBytes(currentFile.size) + " to " + formatBytes(blob.size);
        setStatus("Ready. Resolution was preserved exactly.", "ok");
      } catch (error) {
        setStatus(error && error.message ? error.message : "Could not convert this file.", "error");
      } finally {
        convert.disabled = false;
      }
    });

    download.addEventListener("click", (event) => {
      if (download.getAttribute("aria-disabled") === "true") {
        event.preventDefault();
      }
    });

    async function loadFile(file) {
      revokeOutput();

      if (!isWebp(file)) {
        resetFileState();
        setStatus("Choose a .webp image file.", "error");
        return;
      }

      currentFile = file;
      if (sourceUrl) {
        URL.revokeObjectURL(sourceUrl);
      }
      sourceUrl = URL.createObjectURL(file);
      preview.src = sourceUrl;
      preview.hidden = false;
      empty.hidden = true;
      convert.disabled = false;
      inputInfo.textContent = file.name;
      outputInfo.textContent = "-";
      sizeInfo.textContent = formatBytes(file.size);
      setStatus("File loaded. Convert when ready.", "");

      try {
        const bitmap = await createImageBitmap(file);
        inputInfo.textContent = file.name + " (" + bitmap.width + " x " + bitmap.height + ")";
        bitmap.close();
      } catch {
        setStatus("This browser could not decode the selected WebP file.", "error");
        convert.disabled = true;
      }
    }

    function isWebp(file) {
      return file.type === "image/webp" || /\.webp$/i.test(file.name);
    }

    function canvasToBlob(canvas, type, encoderQuality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) {
            resolve(blob);
          } else {
            reject(new Error("Your browser could not create the JPEG file."));
          }
        }, type, encoderQuality);
      });
    }

    function revokeOutput() {
      if (outputUrl) {
        URL.revokeObjectURL(outputUrl);
      }
      outputUrl = "";
      download.removeAttribute("href");
      download.setAttribute("aria-disabled", "true");
      outputInfo.textContent = currentFile ? "-" : outputInfo.textContent;
    }

    function resetFileState() {
      currentFile = null;
      convert.disabled = true;
      preview.hidden = true;
      preview.removeAttribute("src");
      empty.hidden = false;
      inputInfo.textContent = "-";
      outputInfo.textContent = "-";
      sizeInfo.textContent = "-";
      if (sourceUrl) {
        URL.revokeObjectURL(sourceUrl);
        sourceUrl = "";
      }
    }

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function formatBytes(bytes) {
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit += 1;
      }
      return value.toFixed(value >= 10 || unit === 0 ? 0 : 1) + " " + units[unit];
    }
  </script>
</body>
</html>
